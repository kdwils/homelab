# Source: envoy-proxy-bouncer/charts/envoy-proxy-bouncer/templates/configmap-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-proxy-bouncer-config
  labels:
    helm.sh/chart: envoy-proxy-bouncer-0.5.6
    app.kubernetes.io/name: envoy-proxy-bouncer
    app.kubernetes.io/instance: envoy-proxy-bouncer
    app.kubernetes.io/version: "v0.5.5"
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    bouncer:
      enabled: true
      metrics: false
      metricsInterval: 10m
      tickerInterval: 10s
      tls:
        caPath: /app/tls/ca.crt
        certPath: /app/tls/tls.crt
        enabled: false
        insecureSkipVerify: false
        keyPath: /app/tls/tls.key
      tlsSecretRef:
        caKey: ca.crt
        certKey: tls.crt
        keyKey: tls.key
    captcha:
      challengeDuration: 5m
      enabled: false
      secureCookie: true
      sessionDuration: 15m
      timeout: 10s
    server:
      grpcPort: 8080
      httpPort: 8081
      logLevel: info
    trustedProxies: []
    waf:
      enabled: false
    webhook:
      bufferSize: 100
      subscriptions: []
      timeout: 5s
