# Source: envoy-proxy-bouncer/charts/homelab-envoy-proxy-bouncer/templates/configmap-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-envoy-proxy-bouncer-config
  labels:
    helm.sh/chart: homelab-envoy-proxy-bouncer-0.5.2
    app.kubernetes.io/name: homelab-envoy-proxy-bouncer
    app.kubernetes.io/instance: envoy-proxy-bouncer
    app.kubernetes.io/version: "v0.5.2"
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    bouncer:
      enabled: true
      lapiURL: https://crowdsec-service.crowdsec.svc.cluster.local:8080
      metrics: true
      metricsInterval: 10m
      tickerInterval: 10s
      tls:
        caPath: /etc/ssl/crowdsec/ca.crt
        certPath: /etc/ssl/crowdsec/tls.crt
        keyPath: /etc/ssl/crowdsec/tls.key
    captcha:
      callbackURL: https://bouncer.kyledev.co
      challengeDuration: 5m
      cookieDomain: .kyledev.co
      enabled: true
      provider: turnstile
      secretKeySecretRef:
        key: secretKey
        name: envoy-bouncer
      secureCookie: true
      sessionDuration: 3h
      signingKeySecretRef:
        key: signingKey
        name: envoy-bouncer
      siteKey: 0x4AAAAAAB1bbQbIpIhvAYwl
      timeout: 10s
    server:
      grpcPort: 8080
      httpPort: 8081
      logLevel: info
    trustedProxies:
    - 10.43.0.0/16
    - 10.42.0.0/16
    waf:
      enabled: false
    webhook:
      bufferSize: 100
      subscriptions:
      - events:
        - request_blocked
        url: http://events.events.svc.cluster.local:8080/api/v1/events/envoy-bouncer/request_blocked
      timeout: 5s
