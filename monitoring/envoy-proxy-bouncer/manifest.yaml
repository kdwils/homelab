# Source: envoy-proxy-bouncer/charts/homelab-envoy-proxy-bouncer/templates/configmap-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-envoy-proxy-bouncer-config
  labels:
    helm.sh/chart: homelab-envoy-proxy-bouncer-0.6.0-rc.1
    app.kubernetes.io/name: homelab-envoy-proxy-bouncer
    app.kubernetes.io/instance: envoy-proxy-bouncer
    app.kubernetes.io/version: "v0.6.0-rc.1"
    app.kubernetes.io/managed-by: Helm
data:
  config.yaml: |
    bouncer:
      apiKeySecretRef:
        key: apiKey
        name: envoy-bouncer
      enabled: true
      lapiURL: http://crowdsec-service:8080
      metrics: true
      metricsInterval: 10m
      tickerInterval: 10s
      tls:
        caPath: /app/tls/ca.crt
        certPath: /app/tls/tls.crt
        enabled: false
        insecureSkipVerify: false
        keyPath: /app/tls/tls.key
      tlsSecretRef:
        caKey: ca.crt
        certKey: tls.crt
        keyKey: tls.key
    captcha:
      callbackURL: https://bouncer.kyledev.co
      challengeDuration: 5m
      cookieDomain: .kyledev.co
      disableChallengeReplayProtection: true
      enabled: true
      provider: turnstile
      secretKeySecretRef:
        key: secretKey
        name: envoy-bouncer
      secureCookie: true
      sessionDuration: 3h
      signingKeySecretRef:
        key: signingKey
        name: envoy-bouncer
      siteKey: 0x4AAAAAAB1bbQbIpIhvAYwl
      timeout: 10s
    prometheus:
      enabled: true
      port: 9090
      serviceMonitor:
        enabled: true
        interval: 30s
        prometheusMatchLabels:
          release: kube-prometheus-stack
        scrapeTimeout: 10s
    server:
      grpcPort: 8080
      httpPort: 8081
      logLevel: info
    templates:
      showDeniedPage: false
    trustedProxies:
    - 10.43.0.0/16
    - 10.42.0.0/16
    - 74.98.232.127
    waf:
      apiKeySecretRef:
        key: apiKey
        name: envoy-bouncer
      appSecURL: http://crowdsec-appsec-service:7422
      enabled: true
    webhook:
      bufferSize: 100
      subscriptions:
      - events:
        - request_blocked
        url: http://events.events.svc.cluster.local:8080/api/v1/events/envoy-bouncer/request_blocked
      timeout: 5s
