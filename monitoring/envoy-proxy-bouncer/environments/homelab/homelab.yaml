homelab:
  sealedsecrets:
    - name: envoy-bouncer
      data:
        apiKey: 
        secretKey: 
        signingKey: 
  verticalPodAutoscaler:
    enabled: true
    targetRef:
      name: homelab-envoy-proxy-bouncer
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

homelab-envoy-proxy-bouncer:
  replicaCount: 2
  fullnameOverride: homelab-envoy-proxy-bouncer
  nameOverride: homelab-envoy-proxy-bouncer
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - all
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  grafana:
    dashboard:
      enabled: true

  config:
    exemptIPs:
      - 74.98.232.127
    trustedIPHeader: "cf-connecting-ip"
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        prometheusMatchLabels:
          release: kube-prometheus-stack

    webhook:
      subscriptions:
        - url:
            "http://events.events.svc.cluster.local:8080/api/v1/events/envoy-bouncer/r\
            equest_blocked"
          events:
            - request_blocked

    templates:
      showDeniedPage: false

    bouncer:
      enabled: true
      metrics: true
      metricsInterval: "10m"
      lapiURL: "http://crowdsec-service:8080"
      tickerInterval: "10s"
      apiKeySecretRef:
        name: "envoy-bouncer"
        key: "apiKey"

    waf:
      enabled: true
      appSecURL: "http://crowdsec-appsec-service:7422"
      apiKeySecretRef:
        name: "envoy-bouncer"
        key: "apiKey"

    captcha:
      enabled: true
      provider: "turnstile"
      siteKey: "0x4AAAAAAB1bbQbIpIhvAYwl"
      secretKeySecretRef:
        name: "envoy-bouncer"
        key: "secretKey"
      signingKeySecretRef:
        name: "envoy-bouncer"
        key: "signingKey"
      timeout: "10s"
      challengeDuration: "5m"
      sessionDuration: "3h"
      callbackURL: "https://bouncer.kyledev.co"
      cookieDomain: ".kyledev.co"
      disableChallengeReplayProtection: true

  httproute:
    enabled: true
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    hostnames:
      - bouncer.kyledev.co

  referenceGrant:
    create: true
    fromNamespaces:
      - argocd
      - blog
      - bluesky
      - mealie
      - media
      - pocketid
      - vaultwarden
      - envoy-gateway-system
