crowdsec:
  image:
    repository: crowdsecurity/crowdsec
    pullPolicy: IfNotPresent

  container_runtime: containerd

  secrets:
    externalSecret:
      name: crowdsec-lapi-secrets

  config:
    parsers:
      s01-parse:
        envoy-logs.yaml: |
          onsuccess: next_stage
          name: crowdsecurity/envoy-logs
          description: "Parse Envoy Gateway JSON access logs"
          filter: "evt.Parsed.program == 'envoy'"
          statics:
            - parsed: envoy_parsed
              expression: UnmarshalJSON(evt.Parsed.message, evt.Unmarshaled, "envoy")
            - meta: log_type
              value: http_access-log
            - meta: service
              value: http
            - meta: source_ip
              expression: evt.Unmarshaled.envoy.client_ip
            - parsed: http_status
              expression: string(evt.Unmarshaled.envoy.response_code)
            - parsed: request
              expression: evt.Unmarshaled.envoy["x-envoy-origin-path"]
            - parsed: verb
              expression: evt.Unmarshaled.envoy.method
            - parsed: http_user_agent
              expression: evt.Unmarshaled.envoy["user-agent"]
            - parsed: target_fqdn
              expression: evt.Unmarshaled.envoy[":authority"]

    config.yaml.local: |
      api:
        server:
          auto_registration:
            enabled: true
            token: "${REGISTRATION_TOKEN}"
            allowed_ranges:
              - 10.43.0.0/16
              - 10.42.0.0/16
      db_config:
        use_wal: true

    profiles.yaml: |
      name: appsec_ip_remediation
      filters:
       - Alert.GetScope() == "Ip" && (Alert.GetScenario() contains "appsec" || Alert.GetScenario() contains "vpatch" || Alert.GetScenario() contains "generic-")
      decisions:
       - type: ban
         duration: 4h
      on_success: break
      ---
      name: default_ip_remediation
      filters:
       - Alert.Remediation == true && Alert.GetScope() == "Ip"
      decisions:
       - type: ban
         duration: 4h
      on_success: break
      ---
      name: default_range_remediation
      filters:
       - Alert.Remediation == true && Alert.GetScope() == "Range"
      decisions:
       - type: ban
         duration: 4h
      on_success: break

  lapi:
    enabled: true
    replicas: 1

    env:
      - name: ENROLL_INSTANCE_NAME
        value: homelab
      - name: ENROLL_TAGS
        value: homelab
      - name: ENROLL_KEY
        valueFrom:
          secretKeyRef:
            name: crowdsec-lapi-secrets
            key: enrollmentKey
      - name: LOCAL_API_URL
        value: http://localhost:8080
      - name: DISABLE_AGENT
        value: "true"
      - name: GID
        value: "1000"
      - name: INSECURE_SKIP_VERIFY
        value: "false"
      - name: CS_LAPI_SECRET
        valueFrom:
          secretKeyRef:
            name: crowdsec-lapi-secrets
            key: csLapiSecret
      - name: REGISTRATION_TOKEN
        valueFrom:
          secretKeyRef:
            name: crowdsec-lapi-secrets
            key: registrationToken
      - name: CUSTOM_HOSTNAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 500m
        memory: 500Mi

    persistentVolume:
      data:
        enabled: true
        size: 1Gi
        accessModes:
          - ReadWriteOnce
      config:
        enabled: true
        size: 100Mi
        accessModes:
          - ReadWriteMany

    service:
      type: ClusterIP

    strategy:
      type: Recreate

    metrics:
      enabled: true

  agent:
    enabled: true
    lapiURL: "http://crowdsec-service:8080"

    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    env:
      - name: PARSERS
        value: "crowdsecurity/cri-logs crowdsecurity/syslog-logs crowdsecurity/sshd-logs"
      - name: COLLECTIONS
        value: "crowdsecurity/base-http-scenarios crowdsecurity/http-cve crowdsecurity/appsec-generic-rules crowdsecurity/appsec-virtual-patching crowdsecurity/linux"
      - name: DISABLE_LOCAL_API
        value: "true"
      - name: DISABLE_ONLINE_API
        value: "false"
      - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
        value: "true"

    resources:
      limits:
        cpu: 500m
        memory: 250Mi
      requests:
        cpu: 500m
        memory: 250Mi

    additionalAcquisition:
      - source: file
        filenames:
          - /var/log/containers/envoy-envoy-gateway-system-homelab-*_envoy-gateway-system_*.log
        labels:
          type: containerd
          program: envoy
        poll_without_inotify: true
      - source: file
        filenames:
          - /var/log/pods/*/*/*.log
        labels:
          type: containerd
        poll_without_inotify: true
      - source: file
        filenames:
          - /var/log/syslog
          - /var/log/auth.log
        labels:
          type: syslog
        poll_without_inotify: true

    hostVarLog: true

    extraVolumes:
      - name: varlog-pods
        hostPath:
          path: /var/log/pods
          type: Directory

    extraVolumeMounts:
      - name: varlog-pods
        mountPath: /var/log/pods
        readOnly: true

    persistentVolume:
      config:
        enabled: true
        size: 100Mi
        accessModes:
          - ReadWriteMany

    metrics:
      enabled: true

    service:
      type: ClusterIP

  appsec:
    enabled: true
    lapiURL: "http://crowdsec-service:8080"

    env:
      - name: COLLECTIONS
        value: "crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules"
      - name: DISABLE_LOCAL_API
        value: "true"
      - name: DISABLE_ONLINE_API
        value: "true"
      - name: CROWDSEC_BYPASS_DB_VOLUME_CHECK
        value: "true"

    acquisitions:
      - source: appsec
        listen_addr: "0.0.0.0:7422"
        path: /
        appsec_config: crowdsecurity/virtual-patching
        labels:
          type: appsec

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    metrics:
      enabled: true

    service:
      type: ClusterIP

homelab:
  sealedsecrets:
    - name: crowdsec-lapi-secrets
      data:
        csLapiSecret: 
        enrollmentKey: 
        registrationToken: 
  httproute:
    create: true
    hostnames:
      - crowdsec.int.kyledev.co
      - crowdsec.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: crowdsec-service
            port: 8080
