kube-prometheus-stack:
  crds:
    enabled: true

  alertmanager:
    ingress:
      enabled: false
    
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi

  grafana:
    enabled: true

    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password

    ingress:
      enabled: false

    persistence:
      enabled: true
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
      size: 5Gi

    service:
      type: ClusterIP
      port: 80

    envFromSecret: grafana-oidc-secret

    grafana.ini:
      server:
        root_url: https://grafana.int.kyledev.co
      auth.generic_oauth:
        enabled: true
        name: PocketID
        allow_sign_up: false
        client_id: $__env{client_id}
        client_secret: $__env{client_secret}
        scopes: openid profile email groups
        auth_url: https://pocketid.kyledev.co/authorize
        token_url: https://pocketid.kyledev.co/api/oidc/token
        api_url: https://pocketid.kyledev.co/api/oidc/userinfo
        role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
        use_pkce: true

    sidecar:
      datasources:
        enabled: true
      dashboards:
        enabled: true

  prometheus:
    ingress:
      enabled: false

    service:
      type: ClusterIP
      port: 9090

    prometheusSpec:
      retention: 30d

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: ""
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: 20Gi

  prometheusOperator:
    enabled: true

  kube-state-metrics:
    enabled: true

  prometheus-node-exporter:
    enabled: true

homelab:
  sealedsecrets:
    - name: grafana-admin-secret
      data:
        admin-user: 
        admin-password: 
    - name: grafana-oidc-secret
      data:
        client_id: 
        client_secret: 

  httproutes:
    - name: grafana
      hostnames:
        - grafana.int.kyledev.co
      parentRefs:
        - name: homelab
          namespace: envoy-gateway-system
      rules:
        - backendRefs:
            - group: ""
              kind: Service
              name: kube-prometheus-stack-grafana
              port: 80
    - name: prometheus
      hostnames:
        - prometheus.int.kyledev.co
      parentRefs:
        - name: homelab
          namespace: envoy-gateway-system
      rules:
        - backendRefs:
            - group: ""
              kind: Service
              name: kube-prometheus-stack-prometheus
              port: 9090
