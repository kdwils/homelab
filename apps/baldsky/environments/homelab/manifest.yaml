# Source: homelab/charts/baldsky/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baldsky
  labels:
    helm.sh/chart: baldsky-0.1.31
    app.kubernetes.io/name: baldsky
    app.kubernetes.io/instance: baldsky
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: baldsky
      app.kubernetes.io/instance: baldsky
  template:
    metadata:
      labels:
        helm.sh/chart: baldsky-0.1.31
        app.kubernetes.io/name: baldsky
        app.kubernetes.io/instance: baldsky
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: baldsky
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: baldsky
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: "ghcr.io/kdwils/baldsky:sha-5a2251f8adf957808df667eb63f16cd8edc186d4"
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config=/app/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 10
            httpGet:
              path: /xrpc/_health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 10
            httpGet:
              path: /xrpc/_health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - mountPath: /app/config.yaml
              name: configmap-config
              readOnly: true
              subPath: config.yaml
          env:
            - name: BALDSKY_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: baldsky-app
            - name: BALDSKY_SERVER_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  key: adminToken
                  name: baldsky
      volumes:
        - configMap:
            name: config
          name: configmap-config
