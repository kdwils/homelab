baldsky:
  fullnameOverride: baldsky
  configmaps:
    - name: config
      mountPath: /app/config.yaml
      subPath: config.yaml
      readOnly: true
      data:
        config.yaml: |
          subscription:
            endpoint: "wss://bsky.network"
            reconnect_delay: 5s
          server:
            port: 8080
            log_level: info
            hostname: "https://baldsky.kyledev.co"
            service_did: "did:web:localhost"
            publisher_did: "did:plc:test123"
            did_context: "https://www.w3.org/ns/did/v1"
            service_id: "#bsky_fg"

          database:
            dsn: ""

          pipelines:
            - enabled: true
              short_name: bald
              display_name: "The Bald Feed"
              description: "Posts about baldness, hair loss, and the bald lifestyle"
              collection_name: app.bsky.feed.generator
              keywords:
                - bald
                - balding
                - baldness
                - baldy
                - baldie
                - hairless
                - hair loss
                - losing hair
                - lost my hair
                - going bald
                - starting to bald
                - thinning hair
                - thinning
                - hairline
                - widow's peak
                - widows peak
                - male pattern baldness
                - alopecia
                - minoxidil
                - rogaine
                - finasteride
                - propecia
                - hair transplant
                - hair restoration
                - hairpiece
                - toupee
                - shaved head
                - shaved my head
                - buzzcut
                - buzz cut
                - head shave
                - clean shave
                - chrome dome
                - egghead
                - smooth head
                - baldin
                - receding

  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/kdwils/baldsky
      tag: sha-a3972f9110b5f48388496df05c91e106d60540d9
      pullPolicy: IfNotPresent

    env:
      BALDSKY_DATABASE_DNS:
        valueFrom:
          secretKeyRef:
            name: baldsky-app
            key: uri

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080

  httproute:
    create: true
    hostnames:
      - baldsky.kyledev.co
      - baldsky.int.kyledev.co

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 1Gi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  postgres:
    clusters:
      - name: baldsky
        size: 50Gi
        database: baldsky
        owner: baldsky
        accessModes:
          - ReadWriteMany
