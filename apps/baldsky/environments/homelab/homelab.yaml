baldsky:
  fullnameOverride: baldsky
  configmap:
    create: true
    configmaps:
      - name: config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            subscription:
              endpoint: "wss://bsky.network"
              reconnect_delay: 5s
            server:
              port: 8080
              log_level: info
              hostname: "baldsky.kyledev.co"
              service_did: "did:web:baldsky.kyledev.co"
              publisher_did: "did:plc:4rlgcneeu5n4jdnlfwljdf2j"
              did_context: "https://www.w3.org/ns/did/v1"
              service_id: "#bsky_fg"
              user_agent: baldsky
              user_agent_url: https://github.com/kdwils/baldsky

            database:
              dsn: ""

            pipelines:
              - enabled: true
                short_name: bald
                display_name: "The Bald Feed"
                description: "Posts about baldness, hair loss, and the bald lifestyle"
                collection_name: app.bsky.feed.generator
                keywords:
                  - minoxidil
                  - rogaine
                  - finasteride
                  - propecia
                  - toupee
                  - alopecia
                  - hair transplant
                  - hair restoration
                  - hairpiece
                  - chrome dome
                  - smooth head
                  - shaved head
                  - shaved my head
                  - male pattern baldness
                  - receding hairline
                  - hair loss
                  - losing hair
                  - lost my hair
                  - thinning hair
                  - buzz cut
                  - head shave
                  - clean shave
                  - hair removal
                context_keywords:
                  - bald
                  - balding
                  - baldness
                  - baldy
                  - baldie
                  - widow's peak
                  - widows peak
                  - buzzcut
                context_words:
                  - head
                  - spot
                  - patches
                  - my
                  - his
                  - her
                  - shave
                  - shaving
                  - shaved
                  - look
                  - lifestyle
                  - struggle
                  - proud
                  - journey
                  - confidence
                  - style
                  - cut
                  - clipper
                  - dome
                  - scalp
                  - follicle
                  - follicles
                  - hairline
                  - receding
                  - hair
                  - wig
                  - wigs
                  - transplant
                  - restoration
                  - treatment
                  - medication
                  - doctor
                  - barber
                  - comb
                  - mirror
                  - crown
                  - vertex
                  - norwood
                  - diffuse
                  - thinning
                  - shed
                  - shedding
                  - regrow
                  - regrowth
                  - loss
                  - pattern
                  - male
                  - female
                  - androgenetic
                  - genetics
                  - hereditary
                  - hormones
                  - testosterone
                exclude_keywords:
                  - bald eagle
                  - bald eagles
                  - baldeagle
                  - baldeagles
                  - animals
                  - dog
                  - dogs
                  - cat
                  - cats
                  - bald face
                  - bald faced
                  - tire
                  - tires
                  - hairline fracture
                  - hairline crack
                  - receding tide
                  - receding water
                  - receding flood
                  - receding floodwater
                  - receding glacier
                  - receding gums
                  - toupee fallacy
                  - yard
                  - lawn
                  - grass
                  - garden
                  - mulch
                  - fruit tree
                  - fruit trees
                languages:
                  - en

  serviceAccount:
    create: true
    automount: true

  deployment:
    create: true
    replicas: 1
    deployStrategy: RollingUpdate
    args:
      - "serve"
      - --config=/app/config.yaml
    livenessProbe:
      httpGet:
        path: /xrpc/_health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /xrpc/_health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 200m
        memory: 128Mi
    image:
      repository: ghcr.io/kdwils/baldsky
      tag: sha-c90d54bffca70da60a4d88236bf4941f888a9218
      pullPolicy: IfNotPresent

    env:
      BALDSKY_SERVER_ADMIN_TOKEN:
        valueFrom:
          secretKeyRef:
            name: baldsky
            key: adminToken
      BALDSKY_DATABASE_DSN:
        valueFrom:
          secretKeyRef:
            name: baldsky-app
            key: uri

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - baldsky.kyledev.co
      - baldsky.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 1000m
            memory: 1Gi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

  sealedsecrets:
    - name: baldsky
      data:
        adminToken: 

  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  postgres:
    clusters:
      - name: baldsky
        size: 50Gi
        database: baldsky
        owner: baldsky
        accessModes:
          - ReadWriteOnce
