baldsky:
  configmap:
    create: true
    configmaps:
      - name: api-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            server:
              enabled: true
              port: 8080
              log_level: info
              hostname: "baldsky.kyledev.co"
              service_did: "did:web:baldsky.kyledev.co"
              publisher_did: "did:plc:4rlgcneeu5n4jdnlfwljdf2j"
              did_context: "https://www.w3.org/ns/did/v1"
              service_id: "#bsky_fg"
              user_agent: baldsky
              user_agent_url: https://github.com/kdwils/baldsky

            database:
              dsn: ""
              reconnect_delay: 5s

            subscription:
              enabled: false
              endpoint: "wss://bsky.network"
              reconnect_delay: 5s
              concurrency: 4
              queue_size: 1000

            pipelines:
              - enabled: true
                short_name: bald
                display_name: "Bald Things"
                description: "Curated feed for the follically challenged"
                collection_name: app.bsky.feed.generator
                languages:
                  - en
                link_label: "GitHub"
                link_url: "https://github.com/kdwils/baldsky"

  serviceAccount:
    create: true
    automount: true

  deployment:
    create: true
    replicas: 1
    deployStrategy: RollingUpdate
    args:
      - "serve"
      - --config=/app/config.yaml
    livenessProbe:
      httpGet:
        path: /xrpc/_health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /xrpc/_health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 200m
        memory: 128Mi
    image:
      repository: ghcr.io/kdwils/baldsky
      tag: sha-9bb83b7b699cb1be41702fa82a1e2ee3c2c02cc2
      pullPolicy: IfNotPresent

    env:
      BALDSKY_SERVER_ADMIN_TOKEN:
        valueFrom:
          secretKeyRef:
            name: baldsky
            key: adminToken
      BALDSKY_DATABASE_DSN:
        valueFrom:
          secretKeyRef:
            name: baldsky-app
            key: uri

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - baldsky.kyledev.co
      - baldsky.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 1000m
            memory: 1Gi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

  sealedsecrets:
    - name: baldsky
      data:
        adminToken: 

  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  postgres:
    clusters:
      - name: baldsky
        size: 50Gi
        database: baldsky
        owner: baldsky
        accessModes:
          - ReadWriteOnce
