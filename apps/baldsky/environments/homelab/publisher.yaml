baldsky:
  fullnameOverride: baldsky-publisher
  configmap:
    create: true
    configmaps:
      - name: publisher-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            server:
              enabled: false
              port: 8080
              log_level: info
              hostname: "baldsky.kyledev.co"
              service_did: "did:web:baldsky.kyledev.co"
              publisher_did: "did:plc:4rlgcneeu5n4jdnlfwljdf2j"
              did_context: "https://www.w3.org/ns/did/v1"
              service_id: "#bsky_fg"
              user_agent: baldsky
              user_agent_url: https://github.com/kdwils/baldsky

            database:
              dsn: ""
              reconnect_delay: 5s

            subscription:
              enabled: true
              endpoint: "wss://bsky.network"
              reconnect_delay: 5s
              concurrency: 1
              queue_size: 1000

            nats:
              url: "nats://nats.nats.svc.cluster.local:4222"
              subject: "firehose.events"
              queue_group: ""
              name_prefix: "baldsky"

            publisher:
              enabled: true
              flush_timeout: 5s

  serviceAccount:
    create: true
    automount: true

  deployment:
    create: true
    replicas: 1
    deployStrategy: RollingUpdate
    args:
      - "serve"
      - --config=/app/config.yaml
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 200m
        memory: 128Mi
    image:
      repository: ghcr.io/kdwils/baldsky
      tag: sha-9bb83b7b699cb1be41702fa82a1e2ee3c2c02cc2
      pullPolicy: IfNotPresent

    env:
      BALDSKY_DATABASE_DSN:
        valueFrom:
          secretKeyRef:
            name: baldsky-app
            key: uri

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 1000m
            memory: 1Gi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
