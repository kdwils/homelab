# Source: homelab/charts/baldsky/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baldsky-publisher
  labels:
    helm.sh/chart: baldsky-0.1.31
    app.kubernetes.io/name: baldsky
    app.kubernetes.io/instance: baldsky-publisher
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: baldsky
      app.kubernetes.io/instance: baldsky-publisher
  template:
    metadata:
      labels:
        helm.sh/chart: baldsky-0.1.31
        app.kubernetes.io/name: baldsky
        app.kubernetes.io/instance: baldsky-publisher
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: baldsky-publisher
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: baldsky
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          image: "ghcr.io/kdwils/baldsky:sha-9bb83b7b699cb1be41702fa82a1e2ee3c2c02cc2"
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config=/app/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - mountPath: /app/config.yaml
              name: configmap-publisher-config
              readOnly: true
              subPath: config.yaml
          env:
            - name: BALDSKY_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: baldsky-app
      volumes:
        - configMap:
            name: publisher-config
          name: configmap-publisher-config
---
# Source: homelab/charts/baldsky/templates/vpa.yaml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: baldsky-publisher
  labels:
    helm.sh/chart: baldsky-0.1.31
    app.kubernetes.io/name: baldsky
    app.kubernetes.io/instance: baldsky-publisher
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: baldsky-publisher
  updatePolicy:
    updateMode: InPlace
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      controlledResources:
      - cpu
      - memory
      controlledValues: RequestsAndLimits
      maxAllowed:
        cpu: 1000m
        memory: 1Gi
