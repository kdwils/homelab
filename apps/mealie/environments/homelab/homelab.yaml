mealie:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/mealie-recipes/mealie
      tag: v3.20.1
      pullPolicy: IfNotPresent
    env:
      ALLOW_SIGNUP: "false"
      PUID: "1000"
      PGID: "1000"
      TZ: "America/New_York"
      MAX_WORKERS: "3"
      WEB_CONCURRENCY: "3"
      BASE_URL: "https://mealie.kyledev.co"
      OIDC_AUTH_ENABLED: "true"
      OIDC_PROVIDER_NAME: pocketid
      OIDC_USER_GROUP: "friends"
      OIDC_ADMIN_GROUP: "admins"
      OIDC_CONFIGURATION_URL: "https://pocketid.kyledev.co/.well-known/openid-configuration"
      OIDC_CLIENT_ID: c8b87ff4-436f-4552-ab7e-e2ab0661c73c

    envFrom:
      - secretRef:
          name: mealie-oidc

  service:
    create: true
    type: ClusterIP
    port: 9925
    targetPort: 9000
    name: http

  httproute:
    create: true
    hostnames:
      - mealie.kyledev.co
      - mealie.int.kyledev.co
      - mealie.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: mealie-pvc
        volumeName: mealie
        size: 10Gi
        storageClassName: ""
        accessMode: ReadWriteOnce
        mountPath: /app/data

  sealedsecrets:
    - name: mealie-oidc
      data:
        OIDC_CLIENT_SECRET: 
  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
