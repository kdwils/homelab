pocketid:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/pocket-id/pocket-id
      tag: v2.9.0
      pullPolicy: IfNotPresent

    env:
      APP_URL: "https://pocketid.kyledev.co"
      TRUST_PROXY: "true"
      PUID: "1000"
      PGID: "1000"

    envFrom:
      - secretRef:
          name: pocketid

    readinessProbe:
      httpGet:
        path: /health
        port: 1411

  service:
    create: true
    type: ClusterIP
    port: 1411
    targetPort: 1411
    name: http

  httproute:
    create: true
    hostnames:
      - pocketid.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: pocketid
        size: 5Gi
        storageClassName: ""
        volumeName: pocketid
        accessMode: ReadWriteOnce
        mountPath: /app/data

  sealedsecrets:
    - name: pocketid
      data:
        ENCRYPTION_KEY: 
        SMTP_FROM: 
        SMTP_HOST: 
        SMTP_PASSWORD: 
        SMTP_PORT: 
        SMTP_USER: 
  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
