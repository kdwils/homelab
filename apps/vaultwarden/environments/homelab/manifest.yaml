# Source: homelab/charts/vaultwarden/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  labels:
    helm.sh/chart: vaultwarden-0.1.30
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/instance: vaultwarden
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
      app.kubernetes.io/instance: vaultwarden
  template:
    metadata:
      labels:
        helm.sh/chart: vaultwarden-0.1.30
        app.kubernetes.io/name: vaultwarden
        app.kubernetes.io/instance: vaultwarden
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: vaultwarden-svc
      securityContext:
        fsGroup: 1001
        supplementalGroups:
        - 1001
      containers:
        - name: vaultwarden
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          image: "vaultwarden/server:1.36.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 10
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /data
              name: pvc-vaultwarden
              readOnly: false
          env:
            - name: ADMIN_RATELIMIT_MAX_BURST
              value: "3"
            - name: ADMIN_RATELIMIT_SECONDS
              value: "300"
            - name: DATABASE_MAX_CONNS
              value: "10"
            - name: DATA_FOLDER
              value: "/data"
            - name: DB_CONNECTION_RETRIES
              value: "15"
            - name: DOMAIN
              value: "https://passwords.int.kyledev.co"
            - name: EMAIL_CHANGE_ALLOWED
              value: "true"
            - name: EMERGENCY_ACCESS_ALLOWED
              value: "true"
            - name: EMERGENCY_NOTIFICATION_REMINDER_SCHEDULE
              value: "0 3 * * * *"
            - name: EMERGENCY_REQUEST_TIMEOUT_SCHEDULE
              value: "0 7 * * * *"
            - name: EXTENDED_LOGGING
              value: "true"
            - name: ICON_BLACKLIST_NON_GLOBAL_IPS
              value: "true"
            - name: ICON_REDIRECT_CODE
              value: "302"
            - name: ICON_SERVICE
              value: "internal"
            - name: INVITATIONS_ALLOWED
              value: "false"
            - name: INVITATION_EXPIRATION_HOURS
              value: "120"
            - name: INVITATION_ORG_NAME
              value: "Vaultwarden"
            - name: IP_HEADER
              value: "X-Real-IP"
            - name: LOG_LEVEL
              value: "debug"
            - name: LOG_TIMESTAMP_FORMAT
              value: "%Y-%m-%d %H:%M:%S.%3f"
            - name: ORG_EVENTS_ENABLED
              value: "false"
            - name: ORG_GROUPS_ENABLED
              value: "false"
            - name: REQUIRE_DEVICE_EMAIL
              value: "false"
            - name: ROCKET_ADDRESS
              value: "0.0.0.0"
            - name: ROCKET_PORT
              value: "8080"
            - name: ROCKET_WORKERS
              value: "10"
            - name: SENDS_ALLOWED
              value: "true"
            - name: SHOW_PASSWORD_HINT
              value: "false"
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: SIGNUPS_VERIFY
              value: "true"
            - name: SMTP_ACCEPT_INVALID_CERTS
              value: "false"
            - name: SMTP_ACCEPT_INVALID_HOSTNAMES
              value: "false"
            - name: SMTP_AUTH_MECHANISM
              value: "Plain"
            - name: SMTP_DEBUG
              value: "false"
            - name: SMTP_FROM
              value: "wilson15701@gmail.com"
            - name: SMTP_FROM_NAME
              value: "wilson15701@gmail.com"
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURITY
              value: "starttls"
            - name: TRASH_AUTO_DELETE_DAYS
              value: ""
            - name: WEB_VAULT_ENABLED
              value: "true"
          envFrom:
            - secretRef:
                name: vaultwarden
      volumes:
        - name: pvc-vaultwarden
          persistentVolumeClaim:
            claimName: vaultwarden
