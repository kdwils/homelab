vaultwarden:
  serviceAccount:
    create: true
    name: vaultwarden-svc

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: vaultwarden/server
      tag: 1.36.0
      pullPolicy: IfNotPresent

    env:
      DOMAIN: "https://passwords.int.kyledev.co"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_SECURITY: "starttls"
      SMTP_PORT: "587"
      SMTP_AUTH_MECHANISM: "Plain"
      SMTP_FROM: "wilson15701@gmail.com"
      SMTP_FROM_NAME: "wilson15701@gmail.com"
      SMTP_DEBUG: "false"
      SMTP_ACCEPT_INVALID_HOSTNAMES: "false"
      SMTP_ACCEPT_INVALID_CERTS: "false"
      DATA_FOLDER: "/data"
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "8080"
      ROCKET_WORKERS: "10"
      SHOW_PASSWORD_HINT: "false"
      SIGNUPS_ALLOWED: "false"
      INVITATIONS_ALLOWED: "false"
      SIGNUPS_VERIFY: "true"
      WEB_VAULT_ENABLED: "true"
      DB_CONNECTION_RETRIES: "15"
      DATABASE_MAX_CONNS: "10"
      INVITATION_ORG_NAME: "Vaultwarden"
      ICON_BLACKLIST_NON_GLOBAL_IPS: "true"
      IP_HEADER: "X-Real-IP"
      ORG_EVENTS_ENABLED: "false"
      ORG_GROUPS_ENABLED: "false"
      SENDS_ALLOWED: "true"
      EMERGENCY_ACCESS_ALLOWED: "true"
      EMERGENCY_NOTIFICATION_REMINDER_SCHEDULE: "0 3 * * * *"
      EMERGENCY_REQUEST_TIMEOUT_SCHEDULE: "0 7 * * * *"
      EXTENDED_LOGGING: "true"
      LOG_TIMESTAMP_FORMAT: "%Y-%m-%d %H:%M:%S.%3f"
      ICON_SERVICE: "internal"
      LOG_LEVEL: "debug"
      ICON_REDIRECT_CODE: "302"
      INVITATION_EXPIRATION_HOURS: "120"
      REQUIRE_DEVICE_EMAIL: "false"
      TRASH_AUTO_DELETE_DAYS: ""
      EMAIL_CHANGE_ALLOWED: "true"
      ADMIN_RATELIMIT_SECONDS: "300"
      ADMIN_RATELIMIT_MAX_BURST: "3"

    envFrom:
      - secretRef:
          name: vaultwarden

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 1001
      runAsNonRoot: true
      runAsUser: 1001

    podSecurityContext:
      fsGroup: 1001
      supplementalGroups:
        - 1001

    livenessProbe:
      httpGet:
        path: /alive
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 1
      successThreshold: 1
      failureThreshold: 10

    readinessProbe:
      httpGet:
        path: /alive
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 1
      successThreshold: 1
      failureThreshold: 3

  service:
    create: true
    type: ClusterIP
    port: 80
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - passwords.int.kyledev.co
      - passwords.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: vaultwarden-data-vaultwarden-0
        volumeName: vaultwarden
        size: 15Gi
        storageClassName: ""
        accessMode: ReadWriteOnce
        mountPath: /data

  sealedsecrets:
    - name: vaultwarden
      data:
        adminToken: 
        smtpPassword: 
        smtpUsername: 
  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
