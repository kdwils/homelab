rss:
  serviceAccount:
    create: true
    automount: true

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: freshrss/freshrss
      tag: 1.29.1
      pullPolicy: IfNotPresent
    env:
      CRON_MIN: "13,43"
      PUID: "1000"
      PGID: "1000"
      TZ: "America/New_York"
      OIDC_ENABLED: "1"
      OIDC_PROVIDER_METADATA_URL: https://pocketid.kyledev.co/.well-known/openid-configuration
      OIDC_SCOPES: openid email profile
      OIDC_X_FORWARDED_HEADERS: X-Forwarded-Proto X-Forwarded-Host
      OIDC_REMOTE_USER_CLAIM: preferred_username

    envFrom:
      - secretRef:
          name: freshrss-oidc

    livenessProbe:
      httpGet:
        path: /
        port: http

    readinessProbe:
      httpGet:
        path: /
        port: http

  service:
    create: true
    type: ClusterIP
    port: 80
    name: http

  httproute:
    create: true
    hostnames:
      - "rss.int.kyledev.co"
      - "rss.ts.kyledev.co"
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: rss-pvc
        volumeName: rss
        size: 5Gi
        storageClassName: ""
        accessMode: ReadWriteOnce
        mountPath: /var/www/FreshRSS/data

  sealedsecrets:
    - name: freshrss-oidc
      data:
        OIDC_CLIENT_ID: 
        OIDC_CLIENT_SECRET: 
  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
