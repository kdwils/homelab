coder:
  coder:
    env:
      - name: CODER_PG_CONNECTION_URL
        valueFrom:
          secretKeyRef:
            name: coder-db-app
            key: uri
      - name: CODER_OIDC_ISSUER_URL
        value: https://pocketid.kyledev.co
      - name: CODER_OIDC_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: coder-oidc
            key: OIDC_CLIENT_ID
      - name: CODER_OIDC_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: coder-oidc
            key: OIDC_CLIENT_SECRET
      - name: CODER_OIDC_SCOPES
        value: openid,profile,email,groups
      - name: CODER_ACCESS_URL
        value: https://coder.int.kyledev.co
      - name: CODER_FIRST_USER_EMAIL
        valueFrom:
          secretKeyRef:
            name: coder-admin
            key: FIRST_USER_EMAIL
      - name: CODER_FIRST_USER_USERNAME
        valueFrom:
          secretKeyRef:
            name: coder-admin
            key: FIRST_USER_USERNAME
      - name: CODER_FIRST_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: coder-admin
            key: FIRST_USER_PASSWORD
    service:
      type: ClusterIP
    ingress:
      enable: false

homelab:
  httproute:
    create: true
    hostnames:
      - coder.int.kyledev.co
      - coder.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: coder
            port: 80
  sealedsecrets:
    - name: coder-admin
      data:
        FIRST_USER_EMAIL: 
        FIRST_USER_PASSWORD: 
        FIRST_USER_USERNAME: 
    - name: coder-oidc
      data:
        OIDC_CLIENT_ID: 
        OIDC_CLIENT_SECRET: 
