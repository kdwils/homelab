apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultwarden
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: vaultwarden:homelab
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: vaultwarden
    server: "https://kubernetes.default.svc"
  source:
    path: apps/vaultwarden/environments/homelab
    repoURL: "https://github.com/kdwils/homelab"
    targetRevision: homelab
  sources: []
  project: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
