apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: coder:homelab
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: coder
    server: "https://kubernetes.default.svc"
  source:
    path: apps/coder
    repoURL: "https://github.com/kdwils/homelab"
    targetRevision: homelab
  sources: []
  project: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
