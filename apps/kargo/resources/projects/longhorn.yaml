apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: longhorn-system
  annotations:
    kargo.akuity.io/keep-namespace: "true"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: longhorn-system
  namespace: longhorn-system
spec:
  promotionPolicies:
    - stageSelector:
        name: main
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: "1h0m0s"
  subscriptions:
    - chart:
        repoURL: https://charts.longhorn.io
        name: longhorn
    - chart:
        repoURL: oci://ghcr.io/kdwils/charts/homelab-chart
    - git:
        repoURL: https://github.com/kdwils/homelab.git
        branch: main
        includePaths:
          - glob:infra/longhorn/environments/**
          - glob:charts/longhorn/**
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: main
  namespace: longhorn-system
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: longhorn
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/kdwils/homelab
        - name: targetBranch
          value: main
        - name: warehouse
          value: longhorn
      steps:
        - task:
            name: git-ops-clone
            kind: ClusterPromotionTask
        - task:
            name: helm-update-single-chart
            kind: ClusterPromotionTask
          vars:
            - name: chartPath
              value: charts/longhorn
            - name: chartRepo
              value: https://charts.longhorn.io
            - name: chartName
              value: longhorn
        - task:
            name: helm-update-single-oci-chart
            kind: ClusterPromotionTask
          vars:
            - name: chartPath
              value: charts/longhorn
            - name: chartRepo
              value: oci://ghcr.io/kdwils/charts
            - name: chartName
              value: homelab-chart
        - task:
            name: git-ops-commit-pr
            kind: ClusterPromotionTask
          vars:
            - name: commitMessage
              value: |
                Update longhorn chart dependencies
            - name: prTitle
              value: "Update longhorn chart dependencies"
            - name: prDescription
              value: Update longhorn chart dependencies
