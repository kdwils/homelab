apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: mgnx
  annotations:
    kargo.akuity.io/keep-namespace: "true"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: mgnx
  namespace: mgnx
spec:
  promotionPolicies:
    - stageSelector:
        name: main
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: mgnx
  namespace: mgnx
spec:
  interval: "1h0m0s"
  subscriptions:
    - image:
        repoURL: ghcr.io/kdwils/mgnx
        imageSelectionStrategy: NewestBuild
        allowTags: ^sha-.*
        strictSemvers: false
    - git:
        repoURL: https://github.com/kdwils/homelab.git
        branch: main
        includePaths:
          - glob:media/mgnx/environments/**
          - glob:charts/homelab/**
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: main
  namespace: mgnx
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: mgnx
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: targetBranch
          value: main
        - name: warehouse
          value: mgnx
        - name: imageRepo
          value: ghcr.io/kdwils/mgnx
        - name: valuesFilePath
          value: media/mgnx/environments/homelab/homelab.yaml
        - name: imageTagYamlPath
          value: mgnx.deployment.image.tag
      steps:
        - task:
            name: update-source-main
            kind: ClusterPromotionTask
