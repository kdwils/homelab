apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: tailscale
  annotations:
    kargo.akuity.io/keep-namespace: "true"
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: tailscale
  namespace: tailscale
spec:
  promotionPolicies:
    - stageSelector:
        name: main
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: tailscale
  namespace: tailscale
spec:
  interval: "1h0m0s"
  subscriptions:
    - chart:
        repoURL: https://pkgs.tailscale.com/helmcharts
        name: tailscale-operator
    - chart:
        repoURL: oci://ghcr.io/kdwils/charts/homelab-chart
    - git:
        repoURL: https://github.com/kdwils/homelab.git
        branch: main
        includePaths:
          - glob:infra/tailscale/environments/**
          - glob:charts/tailscale/**
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: main
  namespace: tailscale
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: tailscale
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: warehouse
          value: tailscale
      steps:
        - task:
            name: git-ops-clone
            kind: ClusterPromotionTask
        - task:
            name: helm-update-single-chart
            kind: ClusterPromotionTask
          vars:
            - name: chartPath
              value: charts/tailscale
            - name: chartRepo
              value: https://pkgs.tailscale.com/helmcharts
            - name: chartName
              value: tailscale-operator
        - task:
            name: helm-update-single-oci-chart
            kind: ClusterPromotionTask
          vars:
            - name: chartPath
              value: charts/tailscale
            - name: chartRepo
              value: oci://ghcr.io/kdwils/charts
            - name: chartName
              value: homelab-chart
        - task:
            name: git-ops-commit-pr
            kind: ClusterPromotionTask
          vars:
            - name: commitMessage
              value: "Update tailscale chart dependencies"
