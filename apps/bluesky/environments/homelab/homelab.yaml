bluesky:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/bluesky-social/pds
      tag: 0.4.5009
      pullPolicy: IfNotPresent

    env:
      PDS_HOSTNAME: bluesky.kyledev.co
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
      PDS_BSKY_APP_VIEW_URL: https://api.bsky.app
      PDS_BSKY_APP_VIEW_DID: did:web:api.bsky.app
      PDS_CRAWLERS: https://bsky.network
      LOG_ENABLED: "true"

    envFrom:
      - secretRef:
          name: bluesky

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

  service:
    create: true
    type: ClusterIP
    port: 3000
    targetPort: 3000
    name: pds-port

  httproute:
    create: true
    hostnames:
      - bluesky.kyledev.co
      - bluesky.int.kyledev.co
      - bluesky.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: bluesky-pvc
        volumeName: bluesky-pv
        size: 20Gi
        storageClassName: ""
        accessMode: ReadWriteOnce
        mountPath: /pds

  sealedsecrets:
    - name: bluesky
      data:
        PDS_ADMIN_PASSWORD: 
        PDS_EMAIL_FROM_ADDRESS: 
        PDS_EMAIL_SMTP_URL: 
        PDS_JWT_SECRET: 
        PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: 
  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 1Gi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1
