vertical-pod-autoscaler:
  fullnameOverride: vpa
  rbac:
    create: true
  admissionController:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
    extraArgs:
      - --feature-gates=InPlace=true
  recommender:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
  updater:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi
    extraArgs:
      - --feature-gates=InPlace=true
      - --in-place-skip-disruption-budget=true
