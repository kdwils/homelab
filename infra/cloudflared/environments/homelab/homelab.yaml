cloudflared:
  serviceAccount:
    create: true

  deployment:
    create: true
    replicas: 1
    image:
      repository: cloudflare/cloudflared
      tag: 2026.6.1

    args:
      - tunnel
      - --loglevel
      - debug
      - --config
      - /etc/cloudflared/config/config.yaml
      - run

    livenessProbe:
      httpGet:
        path: /ready
        port: 2000
      initialDelaySeconds: 10
      periodSeconds: 10

    volumeMounts:
      - name: config
        mountPath: /etc/cloudflared/config/config.yaml
        subPath: config.yaml
      - name: creds
        mountPath: /etc/cloudflared/creds/homelab.json
        subPath: homelab.json
      - name: cert
        mountPath: /etc/cloudflared/cert.pem
        subPath: cert.pem

    volumes:
      - name: creds
        secret:
          secretName: tunnel
          items:
            - key: homelab.json
              path: homelab.json
      - name: cert
        secret:
          secretName: tunnel
          items:
            - key: cert.pem
              path: cert.pem
      - name: config
        configMap:
          name: cloudflared
          items:
            - key: config.yaml
              path: config.yaml

  configmap:
    create: true
    configmaps:
      - name: cloudflared
        data:
          config.yaml: |
            tunnel: 34a29bd3-c367-4439-bc8d-32a6dbfc98ff
            credentials-file: /etc/cloudflared/creds/homelab.json
            no-autoupdate: true
            protocol: http2
            metrics: 0.0.0.0:2000
            ingress:
              - hostname: blog.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: blog.kyledev.co
              - hostname: argocd.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: argocd.kyledev.co
              - hostname: mealie.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: mealie.kyledev.co
              - hostname: bluesky.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: bluesky.kyledev.co
              - hostname: pocketid.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: pocketid.kyledev.co
              - hostname: overseerr.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: overseerr.kyledev.co
              - hostname: seerr.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: seerr.kyledev.co
              - hostname: bouncer.kyledev.co
                service: https://homelab-gateway.envoy-gateway-system.svc.cluster.local:443
                originRequest:
                  originServerName: bouncer.kyledev.co
              - service: http_status:404

  sealedsecrets:
    - name: tunnel
      data:
        cert.pem: 
        homelab.json: 
