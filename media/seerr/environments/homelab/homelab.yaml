seerr-chart:
  image:
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  config:
    persistence:
      existingClaim: overseerr-pvc

  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
    readOnlyRootFilesystem: false

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

homelab:
  pvc:
    create: true
    pvcs:
      - name: overseerr-pvc
        volumeName: overseerr
        size: 1Gi
        storageClassName: ""
        accessMode: ReadWriteOnce

  httproute:
    create: true
    hostnames:
      - "seerr.kyledev.co"
      - "seerr.int.kyledev.co"
      - "seerr.ts.kyledev.co"
      - "overseerr.kyledev.co"
      - "overseerr.int.kyledev.co"
      - "overseerr.ts.kyledev.co"
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: overseerr-seerr-chart
            port: 80

  securityPolicy:
    extAuth:
      grpc:
        backendRefs:
          - group: ""
            kind: Service
            name: homelab-envoy-proxy-bouncer
            namespace: crowdsec
            port: 8080
            weight: 1

  verticalPodAutoscaler:
    enabled: true
    targetRef:
      name: overseerr-seerr-chart
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
