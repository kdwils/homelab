bazarr:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: linuxserver/bazarr
      tag: 1.6.0
      pullPolicy: IfNotPresent

    env:
      TZ: "UTC"
      PUID: "1000"
      PGID: "1000"

    volumes:
      - name: bazarr
        persistentVolumeClaim:
          claimName: bazarr-pvc
      - name: media
        persistentVolumeClaim:
          claimName: "media"
    volumeMounts:
      - mountPath: /config
        name: bazarr
        subPath: configs/bazarr
      - mountPath: /movies
        name: media
        subPath: movies
      - mountPath: /tv
        name: media
        subPath: tv

    livenessProbe:
      tcpSocket:
        port: 6767
      initialDelaySeconds: 0
      failureThreshold: 3
      timeoutSeconds: 1
      periodSeconds: 10
    readinessProbe:
      tcpSocket:
        port: 6767
      initialDelaySeconds: 0
      failureThreshold: 3
      timeoutSeconds: 1
      periodSeconds: 10
    startupProbe:
      tcpSocket:
        port: 6767
      initialDelaySeconds: 0
      failureThreshold: 30
      timeoutSeconds: 1
      periodSeconds: 5

  service:
    create: true
    type: ClusterIP
    port: 6767
    targetPort: 6767
    name: http

  httproute:
    create: true
    hostnames:
      - bazarr.ts.kyledev.co
      - bazarr.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: bazarr-pvc
        volumeName: bazarr
        size: 8Gi
        storageClassName: ""
        accessMode: ReadWriteOnce

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
