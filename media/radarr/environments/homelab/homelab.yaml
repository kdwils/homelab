radarr:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: linuxserver/radarr
      tag: 6.2.1
      pullPolicy: IfNotPresent

    env:
      PUID: "0"
      PGID: "0"

    volumes:
      - name: media
        persistentVolumeClaim:
          claimName: media
      - name: radarr
        persistentVolumeClaim:
          claimName: radarr-pvc
    volumeMounts:
      - mountPath: /config
        name: radarr
        subPath: configs/radarr
      - mountPath: /downloads/transmission
        name: media
        subPath: downloads/transmission
      - mountPath: /movies
        name: media
        subPath: movies

  service:
    create: true
    type: ClusterIP
    port: 80
    targetPort: 7878
    name: http

  httproute:
    create: true
    hostnames:
      - radarr.ts.kyledev.co
      - radarr.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: radarr-pvc
        volumeName: radarr
        size: 8Gi
        storageClassName: ""
        accessMode: ReadWriteOnce

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
