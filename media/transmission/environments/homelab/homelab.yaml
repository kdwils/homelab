transmission:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

    image:
      repository: haugene/transmission-openvpn
      tag: 5.4.1
      pullPolicy: IfNotPresent

    env:
      OPENVPN_PROVIDER: NORDVPN
      NORDVPN_PROTOCOL: TCP
      NORDVPN_COUNTRY: US
      NORDVPN_CATEGORY: P2P
      LOCAL_NETWORK: 192.168.0.0/24
      TRANSMISSION_PEER_PORT: "47444"
      TRANSMISSION_DOWNLOAD_DIR: /downloads/transmission
      PUID: "1000"
      PGID: "1000"
      TRANSMISSION_INCOMPLETE_DIR: /downloads/transmission
      TRANSMISSION_HOME: /config/transmission-home

    envFrom:
      - secretRef:
          name: openvpn

    securityContext:
      privileged: true
      capabilities:
        add:
          - NET_ADMIN

    volumes:
      - name: media
        persistentVolumeClaim:
          claimName: media
      - name: transmission
        persistentVolumeClaim:
          claimName: transmission

    volumeMounts:
      - mountPath: /downloads/transmission
        name: media
        subPath: downloads/transmission
      - mountPath: /config/transmission-home
        name: transmission
        subPath: config/transmission-home

  service:
    create: true
    type: ClusterIP
    port: 80
    targetPort: 9091
    name: http

  httproute:
    create: true
    hostnames:
      - transmission.int.kyledev.co
      - transmission.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: transmission
        size: 8Gi
        accessMode: ReadWriteOnce

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits

  sealedsecrets:
    - name: openvpn
      data:
        OPENVPN_PASSWORD: 
        OPENVPN_USERNAME: 
