byparr:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/thephaseless/byparr
      tag: 2.1.0
      pullPolicy: IfNotPresent

    env:
      PORT: "8191"

  service:
    create: true
    type: ClusterIP
    port: 8191
    targetPort: 8191
    name: http

  httproute:
    create: true
    hostnames:
      - byparr.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
