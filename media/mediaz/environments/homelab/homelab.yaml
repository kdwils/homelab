mediaz:
  serviceAccount:
    create: true

  deployment:
    create: true
    replicas: 0
    deployStrategy: Recreate

    image:
      repository: ghcr.io/kasuboski/mediaz
      tag: sha-652175ecde3a9e207eea68c86dfe5fefe8388777
      pullPolicy: IfNotPresent

    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    env:
      MEDIAZ_CONFIGFILEPATH: /app/config.yaml
      LOG_LEVEL: info
      MEDIAZ_PROWLARR_APIKEY:
        valueFrom:
          secretKeyRef:
            name: mediaz
            key: prowlarrKey
      MEDIAZ_TMDB_APIKEY:
        valueFrom:
          secretKeyRef:
            name: mediaz
            key: tmdbKey

    livenessProbe:
      httpGet:
        path: /healthz
        port: 8080
    readinessProbe:
      httpGet:
        path: /healthz
        port: 8080

    volumes:
      - name: mediaz
        persistentVolumeClaim:
          claimName: mediaz
      - name: media
        persistentVolumeClaim:
          claimName: media
    volumeMounts:
      - mountPath: /app/data
        name: mediaz
      - mountPath: /media
        name: media

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - mediaz.ts.kyledev.co
      - mediaz.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: mediaz
        size: 1Gi
        accessMode: ReadWriteOnce
        storageClassName: ""

  sealedsecrets:
    - name: mediaz
      data:
        prowlarrKey: 
        tmdbKey: 
  configmap:
    create: true
    configmaps:
      - name: mediaz-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            configFilePath: /app/config.yaml
            storage:
              filePath: /app/data/db.sqlite
            library:
              downloadMountDir: "/media"
              movie: /media/movies
              tv: /media/tv
            server:
              port: 8080

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
