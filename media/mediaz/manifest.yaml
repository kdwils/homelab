# Source: homelab/charts/mediaz/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediaz
  labels:
    helm.sh/chart: mediaz-0.1.30
    app.kubernetes.io/name: mediaz
    app.kubernetes.io/instance: mediaz
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mediaz
      app.kubernetes.io/instance: mediaz
  template:
    metadata:
      labels:
        helm.sh/chart: mediaz-0.1.30
        app.kubernetes.io/name: mediaz
        app.kubernetes.io/instance: mediaz
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: mediaz
      securityContext:
        {}
      containers:
        - name: mediaz
          image: "ghcr.io/kasuboski/mediaz:sha-cd65514734fbecb79ce0abfc60813684532cf8fa"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: /app/config.yaml
              name: configmap-mediaz-config
              readOnly: true
              subPath: config.yaml
            - mountPath: /app/data
              name: mediaz
            - mountPath: /media
              name: media
          env:
            - name: LOG_LEVEL
              value: "info"
            - name: MEDIAZ_CONFIGFILEPATH
              value: "/app/config.yaml"
            - name: MEDIAZ_PROWLARR_APIKEY
              valueFrom:
                secretKeyRef:
                  key: prowlarrKey
                  name: mediaz
            - name: MEDIAZ_TMDB_APIKEY
              valueFrom:
                secretKeyRef:
                  key: tmdbKey
                  name: mediaz
      volumes:
        - configMap:
            name: mediaz-config
          name: configmap-mediaz-config
        - name: mediaz
          persistentVolumeClaim:
            claimName: mediaz
        - name: media
          persistentVolumeClaim:
            claimName: media
