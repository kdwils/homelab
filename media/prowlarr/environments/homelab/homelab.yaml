prowlarr:
  serviceAccount:
    create: true
    automount: false

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

    image:
      repository: ghcr.io/linuxserver/prowlarr
      tag: 2.5.2
      pullPolicy: IfNotPresent

    env:
      TZ: "UTC"
      PUID: "1000"
      PGID: "1000"

    volumes:
      - name: config
        persistentVolumeClaim:
          claimName: prowlarr-pvc
    volumeMounts:
      - name: config
        mountPath: /config

  service:
    create: true
    type: ClusterIP
    port: 80
    targetPort: 9696
    name: http

  httproute:
    create: true
    hostnames:
      - prowlarr.ts.kyledev.co
      - prowlarr.int.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  pvc:
    create: true
    pvcs:
      - name: prowlarr-pvc
        size: 10Gi
        volumeName: prowlarr
        storageClassName: ""
        accessMode: ReadWriteOnce

  verticalPodAutoscaler:
    enabled: true
    updatePolicy:
      updateMode: InPlace
    resourcePolicy:
      containerPolicies:
        - containerName: "*"
          maxAllowed:
            cpu: 500m
            memory: 512Mi
          controlledResources:
            - cpu
            - memory
          controlledValues: RequestsAndLimits
