# Source: homelab/charts/mgnx/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.21
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: mgnx
      app.kubernetes.io/instance: mgnx
  template:
    metadata:
      labels:
        helm.sh/chart: mgnx-0.1.21
        app.kubernetes.io/name: mgnx
        app.kubernetes.io/instance: mgnx
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mgnx
          image: "ghcr.io/kdwils/mgnx:sha-0890c82b6475e2f42ba8297b8c2baa01ecb9bdf8"
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config=/app/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config.yaml
              name: configmap-mgnx-config
              readOnly: true
              subPath: config.yaml
          env:
            - name: MGNX_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: mgnx-app
      volumes:
        - configMap:
            name: mgnx-config
          name: configmap-mgnx-config
