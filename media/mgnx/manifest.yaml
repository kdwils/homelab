# Source: homelab/charts/mgnx/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.30
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mgnx
      app.kubernetes.io/instance: mgnx
  template:
    metadata:
      labels:
        helm.sh/chart: mgnx-0.1.30
        app.kubernetes.io/name: mgnx
        app.kubernetes.io/instance: mgnx
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mgnx
          image: "ghcr.io/kdwils/mgnx:sha-f00ddc62afa3c4d7fc617822718bcffb75257b69"
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config=/app/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /liveness
              port: 8081
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            failureThreshold: 54
            httpGet:
              path: /readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /app/config.yaml
              name: configmap-mgnx-config
              readOnly: true
              subPath: config.yaml
          env:
            - name: MGNX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: mgnx-app
      volumes:
        - configMap:
            name: mgnx-config
          name: configmap-mgnx-config
---
# Source: homelab/charts/mgnx/templates/postgres.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.30
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  instances: 1
  storage:
    size: 100Gi
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
  bootstrap:
    initdb:
      database: mgnx
      owner: mgnx
  managed:
    services:
      additional:
      - selectorType: rw
        serviceTemplate:
          metadata:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/tags: tag:mgnx-db
            name: mgnx-pg-rw
          spec:
            loadBalancerClass: tailscale
            type: LoadBalancer
---
# Source: homelab/charts/mgnx/templates/httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.30
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab
      namespace: envoy-gateway-system
  hostnames:
    - "mgnx.int.kyledev.co"
    - "mgnx.ts.kyledev.co"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - group: ""
          kind: Service
          name: mgnx
          port: 8080
          weight: 1
