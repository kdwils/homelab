      transaction_timeout: 3s
      max_nodes_per_response: 256
      max_peers_per_response: 50
      bucket_size: 20
      stale_threshold: 5m
  
    crawler:
      crawlers: 20
      discovery_workers: 50
      discovery_queue_size: 4096
      traversal_width: 50
      bootstrap_nodes:
