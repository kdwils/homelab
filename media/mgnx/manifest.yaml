# Source: homelab/charts/mgnx/templates/postgres.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.20
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  instances: 1
  storage:
    size: 50Gi
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
  bootstrap:
    initdb:
      database: mgnx
      owner: mgnx
