# Source: homelab/charts/mgnx/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.27
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mgnx
      app.kubernetes.io/instance: mgnx
  template:
    metadata:
      labels:
        helm.sh/chart: mgnx-0.1.27
        app.kubernetes.io/name: mgnx
        app.kubernetes.io/instance: mgnx
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: gluetun
          restartPolicy: Always
          securityContext:
            capabilities:
              add:
              - NET_ADMIN
            runAsNonRoot: false
            runAsUser: 0
          image: "ghcr.io/qdm12/gluetun:v3.41"
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 9999
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/gluetun
              name: gluetun-data
          env:
            - name: DNS_KEEP_NAMESERVER
              value: "on"
            - name: DOT
              value: "off"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: SERVER_COUNTRIES
              value: "United States"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_ADDRESSES
              value: "10.2.0.2/32"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: WIREGUARD_PRIVATE_KEY
                  name: protonvpn
      containers:
        - name: mgnx
          image: "ghcr.io/kdwils/mgnx:sha-ad6dd3885582a284059ccf674b866215ffd6b673"
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config=/app/config.yaml
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: udp
              containerPort: 6881
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /liveness
              port: 8081
            initialDelaySeconds: 300
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            failureThreshold: 54
            httpGet:
              path: /readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /data
              name: pvc-mgnx-data
              readOnly: false
            - mountPath: /app/config.yaml
              name: configmap-mgnx-config
              readOnly: true
              subPath: config.yaml
            - mountPath: /tmp/gluetun
              name: gluetun-data
              readOnly: true
          env:
            - name: MGNX_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: mgnx-app
      volumes:
        - name: pvc-mgnx-data
          persistentVolumeClaim:
            claimName: mgnx-data
        - configMap:
            name: mgnx-config
          name: configmap-mgnx-config
        - emptyDir: {}
          name: gluetun-data
