        - router.utorrent.com:6881
      alpha: 3
      max_iterations: 8
      max_interval: 3m
      default_interval: 45s
      max_jitter: 30s
      bloom_rotation: 5m
      sample_enqueue_timeout: 50ms
      node_cache_cleanup: 1h
  
    server:
      log_level: info
      torznab_port: 8080
      health_port: 8081
      metrics_port: 9090
  
    indexer:
      workers: 20
      max_concurrent_peers: 30
      request_timeout: 2s
      max_peers: 30
      rate_limit: 200
