# Source: homelab/charts/mgnx/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mgnx
  labels:
    helm.sh/chart: mgnx-0.1.20
    app.kubernetes.io/name: mgnx
    app.kubernetes.io/instance: mgnx
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: mgnx
      app.kubernetes.io/instance: mgnx
  template:
    metadata:
      labels:
        helm.sh/chart: mgnx-0.1.20
        app.kubernetes.io/name: mgnx
        app.kubernetes.io/instance: mgnx
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: mgnx
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: mgnx
          image: "ghcr.io/kdwils/mgnx:sha-69edc03c1375422352e1ab74bbcbcb7b2e52fcce"
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: MGNX_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  key: uri
                  name: mgnx-db-app
