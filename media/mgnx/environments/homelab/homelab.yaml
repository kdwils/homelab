mgnx:
  deployment:
    create: true
    replicas: 1
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-0890c82b6475e2f42ba8297b8c2baa01ecb9bdf8
      pullPolicy: IfNotPresent

    env:
      MGNX_DATABASE_URI:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - mgnx.int.kyledev.co
      - mgnx.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  postgres:
    clusters:
      - name: mgnx
        size: 50Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce

  pvc:
    create: true
    pvcs:
      - name: mgnx-data
        size: 20Mi
        accessMode: ReadWriteOnce
        mountPath: /data

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            dht:
              node_id: 5b58f51a57cec29286e37dc0c36028b328402997
              nodes_path: /data/nodes.dat
              bootstrap_nodes:
                - dht.libtorrent.org:25401
                - dht.transmissionbt.com:6881
                - router.bittorrent.com:6881
              workers: 4
              rate_limit: 25
              rate_burst: 25

            crawler:
              crawlers: 2

            database:
              url: postgresql://mgnx:mgnx@localhost:5432/mgnx?sslmode=disable

            server:
              port: 8080
              log_level: debug

            indexer:
              workers: 20
              rate_limit: 2
              rate_burst: 4
              request_timeout: 3
              allowed_extensions:
                - .mkv
                - .mp4
                - .avi
                - .mov
                - .wmv
                - .m4v
                - .ts
                - .m2ts
                - .vob
                - .flv
                - .webm
                - .mpg
                - .mpeg
                - .mpe
                - .mpv
                - .3gp
                - .3g2
                - .ogv
                - .qt
                - .nsv
                - .f4v
                - .f4p
                - .f4a
                - .f4b
                - .amv
                - .drc
                - .rm
                - .rmvb
                - .viv
                - .asf
                - .svi
                - .roq
                - .mng
                - .mxf

            scrape:
              workers: 5
              trackers:
                - udp://tracker.opentrackr.org:1337/announce
