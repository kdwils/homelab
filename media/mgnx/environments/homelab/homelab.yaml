mgnx:
  serviceMonitor:
    enabled: true
    release: kube-prometheus-stack
    endpoints:
      - port: metrics
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-1abcdeae5c05dcaadaf8e67d506980a2b7af623b
      pullPolicy: IfNotPresent
    livenessProbe:
      httpGet:
        path: /liveness
        port: 8081
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1
    readinessProbe:
      httpGet:
        path: /readiness
        port: 8081
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
      successThreshold: 1

    env:
      MGNX_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    volumes:
      - name: gluetun-data
        emptyDir: {}

    volumeMounts:
      - name: gluetun-data
        mountPath: /tmp/gluetun
        readOnly: true

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP
      - name: metrics
        port: 9090
        targetPort: 9090
        protocol: TCP

  httproute:
    create: true
    hostnames:
      - mgnx.int.kyledev.co
      - mgnx.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - matches:
          - path:
              value: /metrics
        backendRefs:
          - name: mgnx
            port: 9090
      - backendRefs:
          - name: mgnx
            port: 8080

  postgres:
    clusters:
      - name: mgnx
        size: 100Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce
        managed:
          services:
            - selectorType: rw
              serviceTemplate:
                metadata:
                  name: "mgnx-pg-rw"
                  annotations:
                    tailscale.com/expose: "true"
                    tailscale.com/tags: "tag:mgnx-db"
                spec:
                  type: LoadBalancer
                  loadBalancerClass: tailscale

  pvc:
    create: true
    pvcs:
      - name: mgnx-data
        size: 20Mi
        accessMode: ReadWriteOnce
        mountPath: /data

  sealedsecrets:
    - name: protonvpn
      data:
        WIREGUARD_PRIVATE_KEY: 

  initContainers:
    - image:
        repository: ghcr.io/qdm12/gluetun
        tag: v3.41
      name: gluetun
      restartPolicy: Always
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        capabilities:
          add: [ "NET_ADMIN" ]
      ports:
        - containerPort: 9999
          name: health
      startupProbe:
        httpGet:
          path: /
          port: 9999
        failureThreshold: 60
        periodSeconds: 5
      env:
        DNS_KEEP_NAMESERVER: "on"
        DOT: "off"
        FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16"
        VPN_SERVICE_PROVIDER: "protonvpn"
        VPN_TYPE: "wireguard"
        WIREGUARD_ADDRESSES: "10.2.0.2/32"
        SERVER_COUNTRIES: "United States"
        PORT_FORWARD_ONLY: "on"
        VPN_PORT_FORWARDING: "on"
        WIREGUARD_PRIVATE_KEY:
          valueFrom:
            secretKeyRef:
              name: protonvpn
              key: WIREGUARD_PRIVATE_KEY
      volumeMounts:
        - name: gluetun-data
          mountPath: /tmp/gluetun

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            torznab:
              enabled: true
              port: 8080
            dht:
              port: 6881
              forwarded_port_file: "/tmp/gluetun/forwarded_port"
              external_ip_file: "/tmp/gluetun/ip"
              nodes_path: /data/nodes.dat
              workers: 10
              rate_limit: 300
              rate_burst: 30
              discovery_buffer: 10000
              good_node_window: 15m
              bad_failure_threshold: 3
              stale_threshold: 1m
              transaction_timeout: 3s
              token_rotation: 5m
              bucket_size: 20
            crawler:
              enabled: true
              crawlers: 16
              discovery_workers: 50
              discovery_queue_size: 4096
              traversal_width: 50
              bootstrap_nodes:
                - dht.libtorrent.org:25401
                - dht.transmissionbt.com:6881
                - router.bittorrent.com:6881
                - router.utorrent.com:6881
              alpha: 3
              max_iterations: 8
              max_interval: 3m
              default_interval: 45s
              max_jitter: 30s
              bloom_rotation: 5m
              sample_enqueue_timeout: 50ms
              node_cache_cleanup: 1h
            server:
              health_port: 8081
              metrics_port: 9090
              log_level: info
            indexer:
              workers: 30
              max_concurrent_peers: 30
              request_timeout: 2s
              max_peers: 30
              rate_limit: 400
              rate_burst: 800
              exclude_adult_content: true
              min_size: 10485760 # 10 MB
            scrape:
              batch_size: 74
              poll_interval: 10m
              dial_timeout: 3s
              read_timeout: 5s
              dead_after: 2160h # 90 days
              prune_interval: 24h
              trackers:
                - udp://tracker.opentrackr.org:1337/announce
