mgnx:
  deployment:
    create: true
    replicas: 1
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-003507cd0cd8d257eaeaf38479df5338c826c942
      pullPolicy: IfNotPresent

    env:
      MGNX_DATABASE_URI:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - mgnx.int.kyledev.co
      - mgnx.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  postgres:
    clusters:
      - name: mgnx
        size: 50Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            dht:
              node_id: 5b58f51a57cec29286e37dc0c36028b328402997
              bootstrap_nodes:
                - router.bittorrent.com:6881
                - dht.transmissionbt.com:6881
                - router.utorrent.com:6881
                - dht.aelius.com:6881

            server:
              port: 8080
              log_level: debug

            indexer:
              workers: 10
              peer_retries: 15
              peer_timeout: 5s
              allowed_extensions:
                - .mkv
                - .mp4
                - .avi
                - .mov
                - .wmv
                - .m4v
                - .ts
                - .m2ts
                - .vob
                - .flv
                - .webm
                - .srt
                - .ass
                - .ssa
                - .sub

            scrape:
              trackers:
                - udp://open.tracker.cl:1337/announce
                - udp://tracker.openbittorrent.com:6969/announce
                - udp://exodus.desync.com:6969/announce
