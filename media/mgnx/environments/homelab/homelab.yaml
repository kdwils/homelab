  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            server:
              log_level: info
              health_port: 8081
              metrics_port: 9090
            torznab:
              enabled: true
              port: 8080
