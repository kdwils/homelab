mgnx:
  # serviceMonitor:
  #   enabled: true
  #   release: kube-prometheus-stack
  #   endpoints:
  #     - port: metrics
  #       path: /metrics
  #       interval: 30s
  #       scrapeTimeout: 10s

  deployment:
    create: true
    replicas: 1
    deployStrategy: Recreate
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-f00ddc62afa3c4d7fc617822718bcffb75257b69
      pullPolicy: IfNotPresent
    livenessProbe:
      httpGet:
        path: /liveness
        port: 8081
      initialDelaySeconds: 300
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /readiness
        port: 8081
      initialDelaySeconds: 30
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 54
      successThreshold: 1

    env:
      MGNX_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    # volumes:
    #   - name: gluetun-data
    #     emptyDir: {}

    # volumeMounts:
    #   - name: gluetun-data
    #     mountPath: /tmp/gluetun
    #     readOnly: true

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP

  httproute:
    create: true
    hostnames:
      - mgnx.int.kyledev.co
      - mgnx.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: mgnx
            port: 8080

  postgres:
    clusters:
      - name: mgnx
        size: 100Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce
        managed:
          services:
            - selectorType: rw
              serviceTemplate:
                metadata:
                  name: "mgnx-pg-rw"
                  annotations:
                    tailscale.com/expose: "true"
                    tailscale.com/tags: "tag:mgnx-db"
                spec:
                  type: LoadBalancer
                  loadBalancerClass: tailscale

