mgnx:
  deployment:
    create: true
    replicas: 1
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-422dcc778bf5bc068b7ad418558c167e40cf2f75
      pullPolicy: IfNotPresent

    env:
      MGNX_DATABASE_URI:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    port: 8080
    targetPort: 8080
    name: http

  httproute:
    create: true
    hostnames:
      - mgnx.int.kyledev.co
      - mgnx.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system

  postgres:
    clusters:
      - name: mgnx
        size: 50Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            database:
              sslMode: disable

            dht:
              node_id: 5b58f51a57cec29286e37dc0c36028b328402997

            server:
              port: 8080
              log_level: debug

            indexer:
              workers: 10
              peer_retries: 10
              peer_timeout: 3s
              excluded_extensions:
                - .exe
                - .msi
                - .dll
                - .com
                - .scr
                - .bat
                - .cmd
                - .ps1
                - .ps2
                - .vbs
                - .vbe
                - .wsf
                - .wsh
                - .reg
                - .inf
                - .lnk
                - .sh
                - .bash
                - .zsh
                - .go
                - .py
                - .pyc
                - .pyw
                - .rb
                - .pl
                - .lua
                - .js
                - .jar
                - .class
                - .apk
                - .ipa
                - .deb
                - .rpm
                - .zip
                - .rar
                - .7z
                - .tar
                - .gz
                - .bz2
