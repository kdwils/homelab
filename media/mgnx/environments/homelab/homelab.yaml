mgnx:
  deployment:
    create: true
    replicas: 1
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-4d64df9d070b01e057c29e0f589ba8bf8d095e70
      pullPolicy: IfNotPresent

    env:
      MGNX_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    # podAnnotations:
    #   tailscale.com/inject-proxy: "true"
    #   tailscale.com/hostname: mgnx-dht-sidecar
    #   tailscale.com/tags: tag:mgnx-dht

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP
      - name: udp
        port: 6881
        targetPort: 6881
        protocol: UDP

  httproute:
    create: true
    hostnames:
      - torznab.int.kyledev.co
      - torznab.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: mgnx
            port: 8080

  udproutes:
    - name: mgnx
      parentRefs:
        - name: homelab
          namespace: envoy-gateway-system
          sectionName: mgnx
      rules:
        - backendRefs:
            - name: mgnx
              port: 6881

  postgres:
    clusters:
      - name: mgnx
        size: 50Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce

  pvc:
    create: true
    pvcs:
      - name: mgnx-data
        size: 20Mi
        accessMode: ReadWriteOnce
        mountPath: /data

  initContainers:
    - image:
        repository: ghcr.io/qdm12/gluetun
        tag: v3.41
      name: gluetun
      restartPolicy: Always
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        capabilities:
          add: ["NET_ADMIN"]
      ports:
        - containerPort: 9999
      startupProbe:
        httpGet:
          path: /
          port: 9999
        failureThreshold: 60
        periodSeconds: 5
      env:
        DNS_KEEP_NAMESERVER: "on"
        DOT: "off"
        FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16"
        VPN_SERVICE_PROVIDER: "nordvpn"
        OPENVPN_PROTOCOL: "tcp"
        VPN_TYPE: "openvpn"
        SERVER_COUNTRIES: "United States"
        SERVER_CATEGORIES: "p2p"
        OPENVPN_USER:
          valueFrom:
            secretKeyRef:
              name: openvpn
              key: OPENVPN_USERNAME
        OPENVPN_PASSWORD:
          valueFrom:
            secretKeyRef:
              name: openvpn
              key: OPENVPN_PASSWORD

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            dht:
              port: 6881
              node_id: 5b58f51a57cec29286e37dc0c36028b328402997
              nodes_path: /data/nodes.dat
              bootstrap_nodes:
                - dht.libtorrent.org:25401
                - dht.transmissionbt.com:6881
                - router.bittorrent.com:6881
              workers: 4
              rate_limit: 25
              rate_burst: 25
              discovery_buffer: 10000
              good_node_window: 15m
              bad_failure_threshold: 2
              bucket_size: 8
              stale_threshold: 15m
              transaction_timeout: 10s
              token_rotation: 5m
              alpha: 3
              max_iterations: 4

            crawler:
              crawlers: 2

            server:
              port: 8080
              log_level: debug

            indexer:
              workers: 20
              request_timeout: 6s
              max_peers: 100
              rate_limit: 2
              rate_burst: 4
              min_size: 52428800     # 50 MB
              max_size: 161061273600 # 150 GB

            scrape:
              workers: 5
              rate_limit: 2
              rate_burst: 4
              batch_size: 74
              poll_interval: 30s
              dial_timeout: 5s
              read_timeout: 10s
              dead_after: 2160h  # 90 days
              prune_interval: 24h
              trackers:
                - udp://open.stealth.si:80/announce
