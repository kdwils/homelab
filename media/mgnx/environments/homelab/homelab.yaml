mgnx:
  deployment:
    create: true
    replicas: 1
    image:
      repository: ghcr.io/kdwils/mgnx
      tag: sha-0917be757e5f228aefcb3ed55091078b5f8b99b7
      pullPolicy: IfNotPresent

    env:
      MGNX_DATABASE_URL:
        valueFrom:
          secretKeyRef:
            name: mgnx-app
            key: uri
    args:
      - "serve"
      - --config=/app/config.yaml

    podAnnotations:
      tailscale.com/inject-proxy: "true"
      tailscale.com/hostname: mgnx-dht-sidecar
      tailscale.com/tags: tag:mgnx-dht

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  service:
    create: true
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        protocol: TCP
      - name: udp
        port: 6881
        targetPort: 6881
        protocol: UDP

  httproute:
    create: true
    hostnames:
      - torznab.int.kyledev.co
      - torznab.ts.kyledev.co
    parentRefs:
      - name: homelab
        namespace: envoy-gateway-system
    rules:
      - backendRefs:
          - name: mgnx
            port: 8080

  udproutes:
    - name: mgnx
      parentRefs:
        - name: homelab
          namespace: envoy-gateway-system
          sectionName: mgnx
      rules:
        - backendRefs:
            - name: mgnx
              port: 6881

  postgres:
    clusters:
      - name: mgnx
        size: 50Gi
        database: mgnx
        owner: mgnx
        accessModes:
          - ReadWriteOnce

  pvc:
    create: true
    pvcs:
      - name: mgnx-data
        size: 20Mi
        accessMode: ReadWriteOnce
        mountPath: /data

  # Policy-routing init container — routes DHT traffic via the Tailscale sidecar.
  # The Tailscale operator injects the sidecar automatically based on the podAnnotations above.
  #
  # Fill in the following before deploying:
  #   VPS_TAILSCALE_IP: the Tailscale IP of the VPS (e.g. 100.x.y.z)
  #     → run: tailscale status | grep <vps-hostname>
  #   POD_CIDR:         cluster pod CIDR
  #   SERVICE_CIDR:     cluster service CIDR
  #     → run: kubectl cluster-info dump | grep -E "cluster-cidr|service-cidr"
  #
  # IMPORTANT: verify operator injection mode before deploying.
  # Run: kubectl describe pod <mgnx-pod> | grep -A5 initContainers
  # If the Tailscale container is a regular container (not a native sidecar init container),
  # this init container will deadlock. In that case, convert it to a regular extraContainer
  # with the same command — the `until ip link show tailscale0` loop will still work.
  initContainers:
    - name: policy-routing
      image:
        repository: alpine
        tag: "3.21"
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        capabilities:
          add: ["NET_ADMIN"]
      command:
        - sh
        - -c
        - |
          until ip link show tailscale0; do sleep 1; done
          # Block IPv6 DHT — prevents split-IP via homelab IPv6 address
          ip6tables -A OUTPUT -p udp --dport 6881 -j DROP
          ip6tables -A OUTPUT -p udp --sport 6881 -j DROP
          # Mark outbound DHT queries
          iptables -t mangle -A OUTPUT -p udp --dport 6881 -j MARK --set-mark 0x1
          # Mark DHT replies to non-cluster destinations only
          # Both CIDRs required — missing either causes cluster reply traffic to route via tailscale0
          iptables -t mangle -A OUTPUT -p udp --sport 6881 ! -d POD_CIDR ! -d SERVICE_CIDR -j MARK --set-mark 0x1
          # Route marked traffic via VPS
          ip rule add fwmark 0x1 table 200
          ip route add default via VPS_TAILSCALE_IP dev tailscale0 table 200

  configmap:
    create: true
    configmaps:
      - name: mgnx-config
        mountPath: /app/config.yaml
        subPath: config.yaml
        readOnly: true
        data:
          config.yaml: |
            dht:
              port: 6881
              node_id: 5b58f51a57cec29286e37dc0c36028b328402997
              nodes_path: /data/nodes.dat
              bootstrap_nodes:
                - dht.libtorrent.org:25401
                - dht.transmissionbt.com:6881
                - router.bittorrent.com:6881
              workers: 4
              rate_limit: 25
              rate_burst: 25
              discovery_buffer: 10000
              good_node_window: 15m
              bad_failure_threshold: 2
              bucket_size: 8
              stale_threshold: 15m
              transaction_timeout: 10s
              token_rotation: 5m
              alpha: 3
              max_iterations: 4

            crawler:
              crawlers: 2

            server:
              port: 8080
              log_level: debug

            indexer:
              workers: 20
              request_timeout: 6s
              max_peers: 100
              rate_limit: 2
              rate_burst: 4
              min_size: 52428800     # 50 MB
              max_size: 161061273600 # 150 GB

            scrape:
              workers: 5
              rate_limit: 2
              rate_burst: 4
              batch_size: 74
              poll_interval: 30s
              dial_timeout: 5s
              read_timeout: 10s
              dead_after: 2160h  # 90 days
              prune_interval: 24h
              trackers:
                - udp://open.stealth.si:80/announce
